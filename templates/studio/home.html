<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dreamers Studio · توليد السكريبت</title>
<style>
  :root{--deep:#060f1e;--primary:#0077b6;--accent:#00b4d8;--foam:#90e0ef;--gold:#f4c430;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--deep);color:#e8f4f8;font-family:system-ui,'Segoe UI',Tahoma,sans-serif;line-height:1.7;}
  .wrap{max-width:660px;margin:0 auto;padding:24px 16px;}
  .logo{font-size:32px;}
  h1{font-size:22px;font-weight:600;margin:8px 0 4px;}
  .sub{color:var(--foam);font-size:14px;margin:0 0 4px;}
  .nav{display:flex;gap:16px;margin-bottom:24px;}
  .nav a{color:var(--foam);font-size:13px;text-decoration:none;opacity:.7;}
  .nav a:hover,.nav a.active{opacity:1;color:var(--accent);}
  label{display:block;font-size:13px;color:var(--foam);margin:14px 0 6px;}
  input[type=text],select{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #1a3a52;background:#0a1626;color:#e8f4f8;font-size:15px;font-family:inherit;}
  .row{display:flex;gap:10px;}.row>div{flex:1;}
  .rng{display:flex;align-items:center;gap:12px;}
  input[type=range]{flex:1;accent-color:var(--accent);}
  .btn{width:100%;margin-top:16px;padding:13px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--accent);}
  .btn:disabled{opacity:.6;cursor:wait;}
  .btn-gold{background:rgba(244,196,48,.15);border:1px solid var(--gold);color:var(--gold);}
  .btn-gold:hover{background:rgba(244,196,48,.25);}
  .btn-sm{padding:8px 16px;font-size:13px;width:auto;margin-top:0;}
  .btns{display:flex;gap:10px;margin-top:16px;}
  .btns .btn{margin-top:0;}
  .err{background:#3a1212;border:1px solid #6e2020;color:#ffb4b4;padding:12px;border-radius:8px;margin-top:20px;font-size:14px;}
  .card{background:#0a1626;border:1px solid #1a3a52;border-radius:12px;padding:18px;margin-top:24px;}
  .meta{font-size:12px;color:#5a7a90;margin-bottom:12px;}
  .hook{background:rgba(0,180,216,.12);border-radius:8px;padding:12px;margin-bottom:16px;}
  .hook b{color:var(--accent);font-size:11px;}
  .hook p{margin:4px 0 0;font-weight:600;color:var(--foam);}
  .scene{border-right:3px solid var(--primary);padding:8px 12px 8px 0;margin-bottom:12px;}
  .scene .t{color:var(--accent);font-size:12px;font-weight:600;}
  .scene .l{font-size:13px;margin:4px 0;}.scene .l span{color:#5a7a90;}
  .cta-box{background:rgba(244,196,48,.1);border-radius:8px;padding:12px;margin:16px 0;}
  .cta-box b{color:var(--gold);font-size:11px;}
  .cap{font-size:13px;color:#b8d4e0;white-space:pre-wrap;}
  .tags{margin-top:10px;}
  .tag{display:inline-block;background:rgba(0,119,182,.25);color:var(--foam);font-size:12px;padding:3px 10px;border-radius:6px;margin:2px;}
  .h2{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--foam);}
  .voice-row{display:flex;gap:10px;align-items:flex-end;margin-top:4px;}
  .voice-row select{flex:1;margin:0;}
  .voice-row .btn{margin-top:0;width:auto;padding:11px 18px;font-size:14px;}
  .audio-box{background:#0d1f30;border:1px solid #1a3a52;border-radius:8px;padding:12px;margin-top:12px;}
  .audio-box audio{width:100%;border-radius:6px;}
  .audio-box a{display:block;text-align:center;margin-top:8px;color:var(--accent);font-size:13px;text-decoration:none;}
  .audio-box a:hover{text-decoration:underline;}
  #spinner{text-align:center;padding:24px;color:var(--foam);display:none;}
  .voice-hint{font-size:12px;color:#5a7a90;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🐬</div>
  <h1>Dreamers Studio</h1>
  <p class="sub">محطة توليد محتوى السوشيال ميديا</p>
  <div class="nav">
    <a href="/" class="active">السكريبت</a>
    <a href="/voices/">الأصوات</a>
    <a href="/drive/">Drive ☁️</a>
  </div>

  <form id="scriptForm" onsubmit="generateScript(event)">
    {% csrf_token %}
    <label>موضوع البوست</label>
    <input type="text" id="topic" placeholder="مثال: رحلة دولفين VIP في الغردقة" required>
    <div class="row">
      <div>
        <label>المنصة</label>
        <select id="platform">
          {% for key, spec in platforms.items %}
          <option value="{{ key }}">{{ spec.label }} ({{ spec.ratio }})</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>اللغة</label>
        <select id="language">
          <option>ألمانية</option>
          <option>إنجليزية</option>
          <option>إيطالية</option>
          <option>عربية</option>
        </select>
      </div>
    </div>
    <label>الأسلوب</label>
    <select id="tone">
      <option>حماسي ومغامر</option>
      <option>فاخر وهادئ</option>
      <option>عائلي ودافئ</option>
      <option>معلوماتي</option>
    </select>
    <label>طول الفيديو: <span id="dv">30</span> ثانية</label>
    <div class="rng">
      <input type="range" id="duration" min="15" max="90" step="5" value="30"
             oninput="document.getElementById('dv').textContent=this.value">
    </div>

    <label style="margin-top:18px;">الصوت (لتوليد الكل)</label>
    <div class="voice-row">
      <select id="voiceSelect" disabled>
        <option>⏳ جاري تحميل الأصوات...</option>
      </select>
    </div>
    <p class="voice-hint" id="voiceHint">جاري تحميل قائمة الأصوات من ElevenLabs...</p>

    <div class="btns">
      <button type="submit" id="btnScript" class="btn">✍️ سكريبت فقط</button>
      <button type="button" id="btnFull" class="btn btn-gold" onclick="generateFull()" disabled>🎙️ سكريبت + صوت</button>
    </div>
  </form>

  <div id="spinner"></div>
  <div id="errorBox"></div>
  <div id="resultBox"></div>
</div>

<script>
var currentScenes = [];

// ─── تحميل الأصوات عند فتح الصفحة ────────────────────────────────────────────
(function loadVoices() {
  fetch('/api/voices/')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var sel = document.getElementById('voiceSelect');
      if (!d.ok || !d.voices.length) {
        sel.innerHTML = '<option>لا توجد أصوات</option>';
        document.getElementById('voiceHint').textContent = 'تعذّر تحميل الأصوات من ElevenLabs.';
        return;
      }
      sel.innerHTML = d.voices.map(function(v) {
        return '<option value="' + v.id + '">' + v.name + (v.category ? ' (' + v.category + ')' : '') + '</option>';
      }).join('');
      sel.disabled = false;
      document.getElementById('btnFull').disabled = false;
      document.getElementById('voiceHint').textContent = d.voices.length + ' صوت متاح — اختار قبل الضغط على "سكريبت + صوت".';
    })
    .catch(function() {
      document.getElementById('voiceHint').textContent = 'تعذّر الاتصال بـ ElevenLabs.';
    });
})();

// ─── مشترك ────────────────────────────────────────────────────────────────────
function getFormData() {
  return {
    topic:    document.getElementById('topic').value.trim(),
    platform: document.getElementById('platform').value,
    language: document.getElementById('language').value,
    tone:     document.getElementById('tone').value,
    duration: parseInt(document.getElementById('duration').value),
  };
}

function setLoading(msg) {
  document.getElementById('spinner').textContent = msg;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('errorBox').innerHTML = '';
  document.getElementById('resultBox').innerHTML = '';
  document.getElementById('btnScript').disabled = true;
  document.getElementById('btnFull').disabled = true;
}

function clearLoading() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btnScript').disabled = false;
  var sel = document.getElementById('voiceSelect');
  if (!sel.disabled) document.getElementById('btnFull').disabled = false;
}

function showError(msg) {
  document.getElementById('errorBox').innerHTML = '<div class="err">' + msg + '</div>';
}

// ─── توليد السكريبت فقط ───────────────────────────────────────────────────────
function generateScript(e) {
  e.preventDefault();
  var data = getFormData();
  if (!data.topic) { showError('اكتب الموضوع الأول'); return; }
  setLoading('⏳ جاري توليد السكريبت...');

  fetch('/api/generate-script/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (!d.ok) throw new Error(d.error || 'خطأ غير معروف');
    currentScenes = d.script.scenes;
    renderResult(d.script, null);
  })
  .catch(function(err){ showError(err.message); })
  .finally(clearLoading);
}

// ─── توليد السكريبت + الصوت مع بعض ───────────────────────────────────────────
function generateFull() {
  var data = getFormData();
  if (!data.topic) { showError('اكتب الموضوع الأول'); return; }
  var voiceId = document.getElementById('voiceSelect').value;
  if (!voiceId) { showError('اختار صوت أولاً'); return; }

  setLoading('⏳ جاري توليد السكريبت والصوت... (قد يأخذ 15-30 ثانية)');

  fetch('/api/generate-full/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(Object.assign(data, {voice_id: voiceId})),
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (!d.ok) throw new Error(d.error || 'خطأ غير معروف');
    currentScenes = d.script.scenes;
    renderResult(d.script, d.audio_b64);
  })
  .catch(function(err){ showError(err.message); })
  .finally(clearLoading);
}

// ─── رسم النتيجة ──────────────────────────────────────────────────────────────
function renderResult(s, audio_b64) {
  var scenesHtml = s.scenes.map(function(sc) {
    return '<div class="scene">' +
      '<div class="t">' + sc.time + '</div>' +
      '<div class="l"><span>🎬 لقطة:</span> ' + sc.visual + '</div>' +
      '<div class="l"><span>🎙️ صوت:</span> ' + sc.voiceover + '</div>' +
      (sc.text_overlay ? '<div class="l"><span>📝 نص:</span> ' + sc.text_overlay + '</div>' : '') +
      '</div>';
  }).join('');

  var tagsHtml = s.hashtags.map(function(t) {
    return '<span class="tag">#' + t + '</span>';
  }).join('');

  var audioHtml = '';
  if (audio_b64) {
    var audioSrc = 'data:audio/mpeg;base64,' + audio_b64;
    audioHtml =
      '<div class="h2">🎧 التعليق الصوتي</div>' +
      '<div class="audio-box">' +
        '<audio controls><source src="' + audioSrc + '" type="audio/mpeg"></audio>' +
        '<a href="' + audioSrc + '" download="voiceover.mp3">⬇️ تحميل MP3</a>' +
        '<button class="btn btn-gold btn-sm" style="margin-top:8px;width:100%;" onclick="uploadAudioToDrive(\'' + audio_b64 + '\')">☁️ رفع الصوت على Drive</button>' +
        '<p id="driveUploadStatus" style="font-size:12px;color:var(--foam);margin-top:6px;min-height:16px;"></p>' +
      '</div>';
  } else {
    audioHtml =
      '<div class="h2" style="margin-top:20px;">🎙️ توليد التعليق الصوتي</div>' +
      '<div style="display:flex;gap:10px;align-items:center;margin-top:8px;">' +
        '<select id="voiceSelectResult" style="flex:1;padding:10px 12px;border-radius:8px;border:1px solid #1a3a52;background:#0a1626;color:#e8f4f8;font-size:14px;">' +
          document.getElementById('voiceSelect').innerHTML +
        '</select>' +
        '<button type="button" class="btn btn-gold btn-sm" style="white-space:nowrap;" onclick="generateVoiceResult()">🎧 توليد الصوت</button>' +
      '</div>' +
      '<p id="voiceLoadingResult" style="display:none;opacity:.6;font-size:13px;margin-top:8px;">⏳ جاري تحويل النص لصوت...</p>' +
      '<div id="audioResultBox"></div>';
  }

  document.getElementById('resultBox').innerHTML =
    '<div class="card">' +
      '<div class="meta">' + s.meta.platform + ' · ' + s.meta.language + ' · ' + s.meta.duration + 's · ' + s.meta.size + '</div>' +
      '<div class="hook"><b>HOOK</b><p>' + s.hook + '</p></div>' +
      '<div class="h2">المشاهد</div>' + scenesHtml +
      '<div class="cta-box"><b>CTA</b><p style="margin:4px 0 0;">' + s.cta + '</p></div>' +
      '<div class="h2">الكابشن</div>' +
      '<div class="cap">' + s.caption + '</div>' +
      '<div class="tags">' + tagsHtml + '</div>' +
      audioHtml +
    '</div>';
}

// ─── رفع الصوت على Drive ──────────────────────────────────────────────────────
function uploadAudioToDrive(audio_b64) {
  var statusEl = document.getElementById('driveUploadStatus');
  statusEl.textContent = '⏳ جاري الرفع على Drive...';
  var binary = atob(audio_b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var blob = new Blob([bytes], {type: 'audio/mpeg'});
  var form = new FormData();
  var topic = document.getElementById('topic').value.trim() || 'voiceover';
  form.append('file', blob, topic.replace(/\s+/g,'_') + '_voiceover.mp3');

  fetch('/api/drive/upload/', {method:'POST', body: form})
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.ok) {
        statusEl.innerHTML = '✅ تم الرفع! <a href="' + d.file.link + '" target="_blank" style="color:var(--accent);">فتح على Drive ↗</a>';
      } else if (d.error && d.error.includes('مسجّل')) {
        statusEl.innerHTML = '⚠️ سجّل دخولك على <a href="/drive/" style="color:var(--accent);">Drive</a> أولاً';
      } else {
        statusEl.textContent = '❌ ' + d.error;
      }
    })
    .catch(function(e){ statusEl.textContent = '❌ ' + e.message; });
}

// ─── توليد الصوت منفصلاً (بعد سكريبت فقط) ────────────────────────────────────
function generateVoiceResult() {
  var sel = document.getElementById('voiceSelectResult');
  if (!sel) return;
  var voiceId = sel.value;
  document.getElementById('voiceLoadingResult').style.display = 'block';
  document.getElementById('audioResultBox').innerHTML = '';

  fetch('/api/generate-voice/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scenes: currentScenes, voice_id: voiceId}),
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(d){ throw new Error(d.error || 'خطأ'); });
    return r.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    document.getElementById('audioResultBox').innerHTML =
      '<div class="audio-box">' +
        '<audio controls><source src="' + url + '" type="audio/mpeg"></audio>' +
        '<a href="' + url + '" download="voiceover.mp3">⬇️ تحميل MP3</a>' +
      '</div>';
  })
  .catch(function(err) {
    document.getElementById('audioResultBox').innerHTML = '<div class="err">' + err.message + '</div>';
  })
  .finally(function() {
    document.getElementById('voiceLoadingResult').style.display = 'none';
  });
}
</script>
</body>
</html>
